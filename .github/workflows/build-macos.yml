name: Build & Release macOS Aegis Vault

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: aegis_vault

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: aegis_vault/requirements.txt

      - name: Install dependencies
        working-directory: aegis_vault
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create .icns icon
        working-directory: aegis_vault
        run: |
          mkdir -p icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/icon.png --out icon.iconset/icon_${size}x${size}.png >/dev/null 2>&1
            double=$((size * 2))
            if [ "$double" -le 1024 ]; then
              sips -z $double $double assets/icon.png --out icon.iconset/icon_${size}x${size}@2x.png >/dev/null 2>&1
            fi
          done
          iconutil -c icns icon.iconset -o assets/icon.icns

      - name: Build .app with PyInstaller
        working-directory: aegis_vault
        run: |
          pyinstaller AegisVault.spec --noconfirm

      - name: Verify build
        working-directory: aegis_vault
        run: |
          ls -la "dist/Aegis Vault.app/Contents/MacOS/"
          file "dist/Aegis Vault.app/Contents/MacOS/AegisVault"
          du -sh "dist/Aegis Vault.app/"

      - name: Create DMG
        working-directory: aegis_vault
        run: |
          mkdir -p dmg_staging
          cp -R "dist/Aegis Vault.app" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "Aegis Vault" -srcfolder dmg_staging -ov -format UDZO "dist/Aegis_Vault_v3.5.0.dmg"
          rm -rf dmg_staging

      - name: Zip .app (fallback)
        working-directory: aegis_vault
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/Aegis Vault.app" "dist/Aegis_Vault_v3.5.0.zip"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AegisVault-macOS-DMG
          path: aegis_vault/dist/Aegis_Vault_v3.5.0.dmg
          retention-days: 30
          if-no-files-found: error

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: AegisVault-macOS-ZIP
          path: aegis_vault/dist/Aegis_Vault_v3.5.0.zip
          retention-days: 30
          if-no-files-found: error

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            aegis_vault/dist/Aegis_Vault_v3.5.0.dmg
            aegis_vault/dist/Aegis_Vault_v3.5.0.zip
          retention-days: 1

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Aegis Vault ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            Aegis_Vault_v3.5.0.dmg
            Aegis_Vault_v3.5.0.zip
          body: |
            ## Aegis Vault v3.5.0

            Modern Cloud Storage with Zero-Knowledge Encryption.

            Built on Internet Archive — your files are encrypted client-side with AES-256 before they ever leave your computer.

            ### What's New
            - Fixed file loading from folders (cache poisoning bug)
            - Folder list now updates live from archive.org
            - Storage usage chart actually calculates real usage
            - Better error messages in download callbacks
            - Parallel file fetching is more reliable

            ### System Requirements
            - **macOS 10.15 (Catalina)** or later
            - Internet Archive account with S3 credentials

            ### Installation
            1. Download `Aegis_Vault_v3.5.0.dmg` (recommended) or `.zip` below  
            2. Open the DMG and drag **Aegis Vault** to Applications  
            3. Launch from Applications or Spotlight  
            4. Log in with your Internet Archive S3 keys

            ### Verify Download
            ```sh
            shasum -a 256 Aegis_Vault_v3.5.0.dmg
            ```
