name: Build for macOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-13
    env:
      ARCHFLAGS: "-arch x86_64"
      _PYTHON_CONFIGURE: "--build=x86_64-apple-darwin"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: aegis_vault

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: aegis_vault/requirements.txt

      - name: Install dependencies
        working-directory: aegis_vault
        run: |
          python -m pip install --upgrade pip
          ARCHFLAGS="-arch x86_64" pip install --no-binary :all: Pillow
          pip install customtkinter cryptography requests internetarchive pyinstaller

      - name: Create .icns icon
        working-directory: aegis_vault
        run: |
          mkdir -p icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/icon.png --out icon.iconset/icon_${size}x${size}.png >/dev/null 2>&1
            double=$((size * 2))
            if [ "$double" -le 1024 ]; then
              sips -z $double $double assets/icon.png --out icon.iconset/icon_${size}x${size}@2x.png >/dev/null 2>&1
            fi
          done
          iconutil -c icns icon.iconset -o assets/icon.icns
          echo "icon.icns created"

      - name: Build .app with PyInstaller
        working-directory: aegis_vault
        run: |
          pyinstaller AegisVault.spec --noconfirm

      - name: Verify build
        working-directory: aegis_vault
        run: |
          ls -la "dist/Aegis Vault.app/Contents/MacOS/"
          file "dist/Aegis Vault.app/Contents/MacOS/AegisVault"
          du -sh "dist/Aegis Vault.app/"

      - name: Create DMG
        working-directory: aegis_vault
        run: |
          mkdir -p dmg_staging
          cp -R "dist/Aegis Vault.app" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "Aegis Vault" -srcfolder dmg_staging -ov -format UDZO dist/AegisVault_macOS.dmg
          rm -rf dmg_staging
          echo "DMG created"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AegisVault-macOS-x86_64
          path: aegis_vault/dist/AegisVault_macOS.dmg
          retention-days: 30
          if-no-files-found: error

      - name: Upload .app folder
        uses: actions/upload-artifact@v4
        with:
          name: AegisVault-macOS-App
          path: aegis_vault/dist/Aegis Vault.app/
          retention-days: 30
          if-no-files-found: error
