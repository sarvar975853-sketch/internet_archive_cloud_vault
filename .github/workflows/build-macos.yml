name: Build for macOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: aegis_vault

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: aegis_vault/requirements.txt

      - name: Install dependencies
        working-directory: aegis_vault
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create .icns icon
        working-directory: aegis_vault
        run: |
          mkdir -p icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/icon.png --out icon.iconset/icon_${size}x${size}.png >/dev/null 2>&1
            double=$((size * 2))
            if [ "$double" -le 1024 ]; then
              sips -z $double $double assets/icon.png --out icon.iconset/icon_${size}x${size}@2x.png >/dev/null 2>&1
            fi
          done
          iconutil -c icns icon.iconset -o assets/icon.icns
          echo "icon.icns created"

      - name: Build .app with PyInstaller
        working-directory: aegis_vault
        run: |
          pyinstaller AegisVault.spec --noconfirm

      - name: Verify build
        working-directory: aegis_vault
        run: |
          ls -la "dist/Aegis Vault.app/Contents/MacOS/"
          file "dist/Aegis Vault.app/Contents/MacOS/AegisVault"
          du -sh "dist/Aegis Vault.app/"

      - name: Create DMG
        working-directory: aegis_vault
        run: |
          pip install dmgbuild
          dmgbuild -s create_dmg.py "Aegis Vault" dist/AegisVault.dmg || true
          # Fallback: just zip the .app if dmgbuild fails
          if [ ! -f dist/AegisVault.dmg ]; then
            cd dist
            zip -r -y "AegisVault_macOS_Universal.zip" "Aegis Vault.app"
            cd ..
          fi

      - name: Create DMG script
        working-directory: aegis_vault
        run: |
          cat > create_dmg.py << 'DMGEOF'
          import os
          settings = {
              "filename": "dist/AegisVault.dmg",
              "format": "UDZO",
              "volume_name": "Aegis Vault",
              "size": "200M",
              "files": [("dist/Aegis Vault.app", ".")],
              "symlinks": {"Applications": "/Applications"},
              "icon": "assets/icon.icns",
              "icon_locations": {
                  "Aegis Vault.app": (150, 150),
                  "Applications": (450, 150),
              },
              "window": {
                  "position": (200, 120),
                  "size": (600, 400),
              },
              "background": "rgba(9, 9, 11, 1)",
              "text_color": (244, 244, 245),
              "icon_size": 80,
          }
          DMGEOF

      - name: Build DMG
        working-directory: aegis_vault
        run: |
          if command -v hdiutil &> /dev/null; then
            mkdir -p dmg_staging
            cp -R "dist/Aegis Vault.app" dmg_staging/
            ln -s /Applications dmg_staging/Applications
            hdiutil create -volname "Aegis Vault" -srcfolder dmg_staging -ov -format UDZO dist/AegisVault_macOS.dmg
            rm -rf dmg_staging
            echo "DMG created"
          else
            echo "hdiutil not available, creating zip instead"
            cd dist
            zip -r -y "AegisVault_macOS_Universal.zip" "Aegis Vault.app"
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AegisVault-macOS-Universal
          path: |
            aegis_vault/dist/AegisVault_macOS.dmg
            aegis_vault/dist/AegisVault_macOS_Universal.zip
          retention-days: 30
          if-no-files-found: error

      - name: Upload .app folder
        uses: actions/upload-artifact@v4
        with:
          name: AegisVault-macOS-App
          path: aegis_vault/dist/Aegis Vault.app/
          retention-days: 30
          if-no-files-found: error
