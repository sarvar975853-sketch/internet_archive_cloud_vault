name: Build & Release macOS Aegis Vault

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze lib/

      - name: Run tests
        run: flutter test

  build-macos:
    needs: analyze-test
    runs-on: macos-14
    strategy:
      matrix:
        xcode-version: [15.4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Enable macOS Desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Generate macOS platform files
        run: flutter create --platforms=macos .

      - name: Set minimum macOS version to 10.15
        run: |
          sed -i '' 's/platform :osx, '.*'/platform :osx, '10.15'/' macos/Podfile
          sed -i '' 's/MACOSX_DEPLOYMENT_TARGET = [0-9.]\{4,\}/MACOSX_DEPLOYMENT_TARGET = 10.15/g' macos/Runner.xcodeproj/project.pbxproj
          echo "=== macOS deployment target set to 10.15 ==="
          grep -n "DEPLOYMENT_TARGET\|platform :osx" macos/Podfile macos/Runner.xcodeproj/project.pbxproj 2>/dev/null || true

      - name: Build macOS app
        run: flutter build macos --release

      - name: Locate .app
        id: find_app
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in build output"
            ls -la build/macos/Build/Products/Release/ 2>/dev/null || true
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Found app at: $APP_PATH"

      - name: Verify build
        run: |
          file "$APP_PATH"
          echo "=== Minimum OS version ==="
          plutil -p "$APP_PATH/Contents/Info.plist" | grep -i minimum || true
          otool -l "$APP_PATH/Contents/MacOS/"* 2>/dev/null | grep -A2 LC_VERSION_MIN || true

      - name: Create DMG
        continue-on-error: true
        run: |
          brew install create-dmg
          APP_BASENAME=$(basename "$APP_PATH")
          create-dmg \
            --volname "Aegis Vault" \
            --window-pos 200 120 \
            --window-size 600 450 \
            --icon-size 100 \
            --icon "$APP_BASENAME" 175 120 \
            --hide-extension "$APP_BASENAME" \
            --app-drop-link 425 120 \
            "Aegis_Vault_v3.5.0.dmg" \
            "$(dirname "$APP_PATH")"

      - name: Zip .app (fallback)
        run: |
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "Aegis_Vault_v3.5.0.zip"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: aegis-vault-macos-dmg
          path: Aegis_Vault_v3.5.0.dmg
          retention-days: 30

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: aegis-vault-macos-zip
          path: Aegis_Vault_v3.5.0.zip
          retention-days: 30

      - name: Upload build artifacts for release
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            Aegis_Vault_v3.5.0.dmg
            Aegis_Vault_v3.5.0.zip
          retention-days: 1

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Aegis Vault ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            Aegis_Vault_v3.5.0.dmg
            Aegis_Vault_v3.5.0.zip
          body: |
            ## Aegis Vault ${{ github.ref_name }}

            Modern cloud storage desktop app with zero-knowledge encryption, built on Internet Archive.

            ### What's New
            - Migrated from Python/Tkinter to **Flutter/Dart** for native performance
            - AES-256-CTR+HMAC encryption for credentials and file data
            - Background folder discovery with live UI updates
            - Parallel file uploads and downloads
            - Create Folder support directly from the sidebar

            ### System Requirements
            - **macOS 10.15 (Catalina)** or later
            - Internet Archive account with S3 credentials

            ### Installation
            1. Download `Aegis_Vault_v3.5.0.dmg` (recommended) or `.zip` below
            2. Open the DMG and drag **Aegis Vault** to Applications
            3. Launch from Applications or Spotlight

            ### Verify Download
            ```bash
            shasum -a 256 Aegis_Vault_v3.5.0.dmg
            ```
