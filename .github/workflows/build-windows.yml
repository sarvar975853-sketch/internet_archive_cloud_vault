name: Build for Windows

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.9"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: cmd

      - name: Verify installations
        run: |
          python --version
          pip list | findstr "customtkinter cryptography requests Pillow pyinstaller"
          echo "Inno Setup installed at:"
          dir "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        shell: cmd

      - name: Create Windows icon from PNG
        run: |
          python -c "
          from PIL import Image
          img = Image.open('assets/icon.png')
          img = img.resize((256, 256), Image.LANCZOS)
          img.save('assets/icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print('icon.ico created successfully')
          "

      - name: Build with PyInstaller
        run: |
          pyinstaller AegisVault_Windows.spec --noconfirm

      - name: Verify build output
        run: |
          dir dist\AegisVault
        shell: cmd

      - name: Build installer with Inno Setup
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        shell: cmd

      - name: Verify installer
        run: |
          dir installer_output
        shell: cmd

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AegisVault-Windows-Installer
          path: installer_output/AegisVault_Setup_*.exe
          retention-days: 30
          if-no-files-found: error

      - name: Upload folder build
        uses: actions/upload-artifact@v4
        with:
          name: AegisVault-Windows-Folder
          path: dist/AegisVault/
          retention-days: 30
          if-no-files-found: error
