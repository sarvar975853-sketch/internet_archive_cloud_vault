name: Build for Windows

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.9"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify installations
        run: |
          python --version
          pip list | findstr "customtkinter cryptography requests Pillow pyinstaller"
        shell: cmd

      - name: Create Windows icon from PNG
        run: |
          python -c "
          from PIL import Image
          import os
          img = Image.open('assets/icon.png')
          img = img.resize((256, 256), Image.LANCZOS)
          img.save('assets/icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print('icon.ico created successfully')
          "

      - name: Build with PyInstaller
        run: |
          pyinstaller AegisVault_Windows.spec --noconfirm

      - name: Verify build output
        run: |
          dir dist\AegisVault
        shell: cmd

      - name: Create distributable zip
        run: |
          Compress-Archive -Path dist\AegisVault\* -DestinationPath dist\AegisVault_Windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AegisVault-Windows
          path: dist/AegisVault_Windows.zip
          retention-days: 30
          if-no-files-found: error

      - name: Upload folder build
        uses: actions/upload-artifact@v4
        with:
          name: AegisVault-Windows-Folder
          path: dist/AegisVault/
          retention-days: 30
          if-no-files-found: error
